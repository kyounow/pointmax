name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # 週次 cron (Weekly Master Sync) は auto-merge / review-only 履歴 push を
  # GITHUB_TOKEN で main に反映するが、GITHUB_TOKEN 由来の push は push トリガーを
  # 起動しない (GitHub の再帰防止仕様)。そのため sync 完了を workflow_run で受けて
  # 確実に再デプロイする。
  workflow_run:
    workflows: ["Weekly Master Sync"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # workflow_run 経由のときは sync 成功時のみデプロイ (失敗 run では公開しない)。
    # push / workflow_dispatch では常に実行。
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run の既定チェックアウトは upstream 開始時 (= マージ前) の SHA を
          # 指すため、最新 main を明示してマージ後の内容をビルドする。
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_BASE: /pointmax/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
