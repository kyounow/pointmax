name: Lint

# v6.1.1 / PR #68 (白画面クラッシュ = react-hooks/rules-of-hooks 違反) の再発防止として
# 当初は rules-of-hooks だけを見る `lint:hooks` ゲートを暫定導入した (PR #69)。
# v6.2.0 で既存 lint エラーを全解消したため、本ゲートを full `npm run lint`
# (eslint.config.js = react-hooks 全ルール + typescript-eslint + react-refresh) に昇格。
# 暫定の eslint.hooks.config.js / lint:hooks script は撤去済 (full lint が rules-of-hooks を包含)。
#
# これで set-state-in-effect / 未使用変数 / export 分割漏れ等も含め、PR / main push で
# lint 違反が全てマージ前にブロックされる。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
