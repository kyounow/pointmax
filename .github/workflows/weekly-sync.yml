name: Weekly Master Sync

on:
  schedule:
    # 週2回。日曜・水曜 21:00 UTC = 月曜・木曜 06:00 JST
    - cron: '0 21 * * 0,3'
  workflow_dispatch:
    inputs:
      force_review_only:
        description: 'auto-merge をスキップし、全件 review PR に流す (慣らしテスト用)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-sync
  cancel-in-progress: false  # 進行中の cron を中断しない

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # peter-evans/create-pull-request が full history を必要とする

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Fetch all enabled sources
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run sync:fetch-all

      - name: Propose
        run: npm run sync:propose

      - name: Read counts
        id: counts
        run: |
          AUTO=$(jq '.autoApplicable | length' sources/proposed-migrations.json)
          REVIEW=$(jq '.needsReview | length' sources/proposed-migrations.json)
          echo "auto=$AUTO" >> $GITHUB_OUTPUT
          echo "review=$REVIEW" >> $GITHUB_OUTPUT
          echo "📊 auto=$AUTO, review=$REVIEW"

      - name: Read config
        id: config
        run: |
          ENABLED=$(jq -r '.autoMergeEnabled // false' sync.config.json)
          MAX=$(jq -r '.maxAutoChangesPerRun // 50' sync.config.json)
          # workflow_dispatch で force_review_only=true なら ENABLED を上書き
          if [ "${{ inputs.force_review_only }}" = "true" ]; then
            ENABLED=false
            echo "ℹ️ force_review_only=true なので autoMergeEnabled を false に上書き"
          fi
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          echo "max=$MAX" >> $GITHUB_OUTPUT
          echo "🛠 autoMergeEnabled=$ENABLED, max=$MAX"

      - name: Generate reports
        run: npm run sync:report

      # ===== Tier 1: Auto-merge via PR (auto-merge enabled) =====
      # 旧仕様 (~2026-05-27 PR #48 前) では直接 main に push していたが、
      # GitHub の PR タブで履歴を一望できる + アプリ内「更新履歴」タブと
      # 連動できるようにするため PR 経由に切替。
      - name: Apply auto changes
        if: steps.counts.outputs.auto > 0
        run: npm run sync:apply

      - name: Safety check (count + test + build)
        if: steps.counts.outputs.auto > 0 && steps.config.outputs.enabled == 'true'
        id: safety
        continue-on-error: true
        run: |
          if [ ${{ steps.counts.outputs.auto }} -gt ${{ steps.config.outputs.max }} ]; then
            echo "❌ auto 件数 ${{ steps.counts.outputs.auto }} > max ${{ steps.config.outputs.max }}"
            exit 2
          fi
          npm test
          npm run build

      - name: Create auto-sync PR + enable auto-merge
        if: steps.counts.outputs.auto > 0 && steps.config.outputs.enabled == 'true' && steps.safety.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 日付 + 時刻でユニーク化 (同日 2 回走っても衝突しない)
          BRANCH="auto-sync/$(date -u +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          # src/state/seed.ts は意図的に対象外: SEED_VERSION はリリース粒度で
          # cron は bump しない (apply-proposals は seed.ts を書き換えない)。
          # 既存ユーザーへの追加分通知は SyncUpdateModal が差分検知で担う。
          # SYNC_HISTORY は監査ログ + アプリ内「更新履歴」タブのデータソース。
          git add src/state/seed-additions.ts \
                  sources/extracted/ \
                  sources/proposed-migrations.json \
                  sources/SYNC_HISTORY.json \
                  sources/SYNC_HISTORY.md
          if git diff --cached --quiet; then
            echo "ℹ️ no changes to commit"
            exit 0
          fi
          git commit -F sources/AUTO_SUMMARY.md
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🤖 auto-sync: ${{ steps.counts.outputs.auto }} 件 ($(TZ=Asia/Tokyo date +%Y-%m-%d))" \
            --body-file sources/AUTO_SUMMARY.md \
            --label auto-sync)
          echo "📋 PR created: $PR_URL"
          # safety check 済みなので auto-merge を有効化。
          # branch protection が無い repo では即時マージされる。
          gh pr merge --squash --auto --delete-branch "$PR_URL"
          echo "✓ auto-merge enabled (squash + delete-branch)"
          # deploy.yml の workflow_run が「マージ後の main」を確実にビルドできるよう、
          # PR が MERGED になるまで待つ (branch protection 無しなら即時マージされる)。
          STATE=""
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_URL" --json state -q .state)
            echo "  PR state: $STATE (try $i)"
            [ "$STATE" = "MERGED" ] && break
            sleep 2
          done
          if [ "$STATE" != "MERGED" ]; then
            echo "⚠️ PR が時間内にマージされず。workflow_run deploy がマージ前 main を拾う可能性あり (次回 sync / 手動 deploy で回復)"
          fi

      # auto-sync PR を作った後は working tree を main に戻す。
      # 後段の review-PR (peter-evans) が auto 変更を二重に含まないようにするため。
      # REVIEW_QUEUE.md は次のステップで使うため一時退避する。
      - name: Return to main after auto-sync PR
        if: steps.counts.outputs.auto > 0 && steps.config.outputs.enabled == 'true' && steps.safety.outcome == 'success'
        run: |
          if [ -f sources/REVIEW_QUEUE.md ]; then
            cp sources/REVIEW_QUEUE.md /tmp/REVIEW_QUEUE.md
          fi
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          if [ -f /tmp/REVIEW_QUEUE.md ]; then
            cp /tmp/REVIEW_QUEUE.md sources/REVIEW_QUEUE.md
          fi
          echo "✓ working tree を main に reset (review-PR 用)"

      # ===== auto を review に降格 (auto-sync PR を作らなかった run) =====
      # auto-sync PR が作られないのは次の 2 ケース:
      #   (1) safety check 失敗 (件数超過 / test / build 失敗) … enabled=true
      #   (2) auto-merge 無効 (autoMergeEnabled=false / force_review_only=true)
      # どちらも autoApplicable が proposed-migrations.json に残ると REVIEW_QUEUE.md
      # にも SYNC_HISTORY (auto 件数) にも不整合が出る。全 autoApplicable を needsReview
      # に移して sync:report を再実行し、auto=0 / review=全件 に正規化する。
      # 理由は (1)=safetyFailed / (2)=autoMergeDisabled で区別。
      - name: Downgrade auto to review (no auto-merge this run)
        if: ${{ steps.counts.outputs.auto > 0 && !(steps.config.outputs.enabled == 'true' && steps.safety.outcome == 'success') }}
        env:
          DOWNGRADE_REASON: ${{ (steps.config.outputs.enabled == 'true' && steps.safety.outcome != 'success') && 'safetyFailed' || 'autoMergeDisabled' }}
        run: |
          node -e "
            const fs = require('fs');
            const reason = process.env.DOWNGRADE_REASON;
            const m = JSON.parse(fs.readFileSync('sources/proposed-migrations.json', 'utf-8'));
            const downgraded = m.autoApplicable.map(p => ({
              ...p,
              reviewReason: reason,
            }));
            m.needsReview = [...m.needsReview, ...downgraded];
            m.autoApplicable = [];
            m.summary.needsReviewCount = m.needsReview.length;
            m.summary.autoApplicableCount = 0;
            fs.writeFileSync('sources/proposed-migrations.json', JSON.stringify(m, null, 2));
            console.log('Downgraded', downgraded.length, 'auto items to review (' + reason + ')');
          "

      - name: Regenerate reports (after downgrade)
        if: ${{ steps.counts.outputs.auto > 0 && !(steps.config.outputs.enabled == 'true' && steps.safety.outcome == 'success') }}
        run: npm run sync:report

      # ===== review-only / no-auto-merge 週の履歴を main に公開 =====
      # auto-sync PR を作らない run (auto=0 / autoMergeEnabled=false / safety 失敗) でも、
      # sync:report は SYNC_HISTORY に entry を生成済み (auto>0 OR review>0 で非 null。
      # review-only 週も記録するのは PR #61 の設計)。ところが従来そのファイルは
      # どこにもコミットされず破棄されていた (auto-sync PR パスでしか add しておらず、
      # review-PR の add-paths にも無く、そのブランチも main 未マージ)。
      # → アプリ内「更新履歴」タブに review-only 週が出ないバグの修正。
      # SYNC_HISTORY は監査ログ (seed/コード非変更) なので main へ直 push し、
      # deploy.yml の workflow_run トリガーが再デプロイ=公開を担う。
      - name: Publish SYNC_HISTORY to main (review-only / no auto-merge runs)
        if: ${{ !(steps.counts.outputs.auto > 0 && steps.config.outputs.enabled == 'true' && steps.safety.outcome == 'success') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources/SYNC_HISTORY.json sources/SYNC_HISTORY.md
          if git diff --cached --quiet; then
            echo "ℹ️ SYNC_HISTORY に変更なし (本当に変化なしの週)。skip"
            exit 0
          fi
          git commit -m "chore(sync): update SYNC_HISTORY (review-only run)"
          # review-PR 用に残る作業ツリー変更 (REVIEW_QUEUE/extracted/proposed 等) を
          # 一時退避してから rebase + push し、後段ステップ用に復元する。
          git stash push -u || true
          git pull --rebase origin main
          git push origin HEAD:main
          git stash pop || true
          echo "✓ SYNC_HISTORY を main に公開 (workflow_run deploy が再デプロイ)"

      # ===== Tier 2: Review PR =====
      # 条件:
      #   needsReview > 0   OR
      #   auto > 0 で autoMergeEnabled=false   OR
      #   auto > 0 で safety 失敗 (fallback)
      - name: Determine review-PR trigger
        id: review_trigger
        run: |
          NEED_REVIEW="${{ steps.counts.outputs.review > 0 }}"
          AUTO_BLOCKED="false"
          if [ "${{ steps.counts.outputs.auto }}" -gt 0 ]; then
            if [ "${{ steps.config.outputs.enabled }}" != "true" ]; then
              AUTO_BLOCKED="true"
            elif [ "${{ steps.safety.outcome }}" != "success" ]; then
              AUTO_BLOCKED="true"
            fi
          fi
          if [ "$NEED_REVIEW" = "true" ] || [ "$AUTO_BLOCKED" = "true" ]; then
            echo "active=true" >> $GITHUB_OUTPUT
          else
            echo "active=false" >> $GITHUB_OUTPUT
          fi
          echo "🧪 review PR active=$NEED_REVIEW || auto_blocked=$AUTO_BLOCKED"

      # Stage review queue artifacts so peter-evans/create-pull-request picks them up.
      # Main の auto commit が走った場合、ここでステージするのは「main にすでに含まれない」変更のみ。
      - name: Stage review queue artifacts
        if: steps.review_trigger.outputs.active == 'true'
        run: |
          git add sources/REVIEW_QUEUE.md sources/proposed-migrations.json sources/extracted/ || true
          # ステージ済みのみ差分を確認 (一切無ければ peter-evans が no-op して終わる)
          git status --short

      - name: Create/update review PR
        if: steps.review_trigger.outputs.active == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-review-queue
          delete-branch: false
          title: "📋 週次マスタ同期: 要レビュー項目"
          body-path: sources/REVIEW_QUEUE.md
          commit-message: |
            chore: update sync review queue

            See sources/REVIEW_QUEUE.md for details.
          labels: |
            needs-review
          add-paths: |
            sources/REVIEW_QUEUE.md
            sources/proposed-migrations.json
            sources/extracted/**

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Sync Result" >> $GITHUB_STEP_SUMMARY
          echo "- autoApplicable: ${{ steps.counts.outputs.auto }}" >> $GITHUB_STEP_SUMMARY
          echo "- needsReview: ${{ steps.counts.outputs.review }}" >> $GITHUB_STEP_SUMMARY
          echo "- autoMergeEnabled: ${{ steps.config.outputs.enabled }}" >> $GITHUB_STEP_SUMMARY
          echo "- safety: ${{ steps.safety.outcome || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- review-PR: ${{ steps.review_trigger.outputs.active || 'false' }}" >> $GITHUB_STEP_SUMMARY
