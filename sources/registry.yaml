# PointMax master sync: source registry
# 各クレカ・ポイントカード・決済アプリの「マスタとなる公式ページ」を列挙する。
# 週次 GitHub Actions cron がこのファイルを読み、各 enabled: true なソースを Gemini CLI に渡す。
#
# 編集ルール:
#  - 新規追加時は id をユニーク (slug, kebab-case) に
#  - 一時的に止めたい場合は enabled: false で残す (履歴のため削除しない)
#  - notes に「なぜこのソースを選んだか」を残すと将来の自分が助かる
#
# extractor の選択肢: card | jal-tokuyaku | point-partner | payment-app
# produces の選択肢:  cards / storeRules / categoryRules / stores / loyaltyRules / paymentApps
# extractionScope:    comprehensive | chains-only | existing-only

version: 1

sources:
  - id: jal-card-tokuyaku-list
    label: JALカード特約店 検索結果 (公式)
    url: https://partner.jal.co.jp/search_result/?ptn=1&ct=2&scat=1201
    extractor: jal-tokuyaku
    produces:
      - stores
      - storeRules
      - categoryRules
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-12 (3 度目): milenet/group/index.html も Gemini が "navigation hub,
      not the partner list itself" と判定。実際の店舗データを持つ URL に再々切替。
      partner.jal.co.jp/search_result/ は条件指定型の検索結果ページで、
      ptn=1 (マイルのため方=JALカード決済), ct=2, scat=1201 のパラメタで
      特定カテゴリの特約店リストが取得可能。curl で 104KB のサーバーレンダ済 HTML 確認済。
      他の代替候補 (失敗時の選択肢):
        - https://partner.jal.co.jp/mapsearch/ (地図検索、JS-heavy)
        - https://www.jal.co.jp/jp/ja/jalcard/milenet/group/index.html (navigation hub 判定)
        - https://partner.jal.co.jp/site/tokuyakuten/campaign/ (キャンペーン一覧、店舗 list 無し)
        - https://jalcard.jal.co.jp/milenet/jalcardlife/newpartner/ (新規特約店、月次差分)
      これでも失敗するなら scat パラメタを複数列挙して URL を複数 source に分割する案検討。
      ---
      JALカード共通の特約店一覧。マイル積算率 200% (= 2%) の店舗を網羅。
      個別店舗 (地元飲食店等) まで全部含めると膨大なので chains-only に限定。
      全国チェーンだけ新規取り込み、既存登録の特約店についてはキャンペーン/還元率変動を検知。
      cardId は jal-suica を主に対象、他の JALカード保有時は別ソース追加で対応。

  - id: rakuten-point-partners
    label: 楽天ポイントカード 加盟店 (公式)
    url: https://pointcard.rakuten.co.jp/partner/
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      楽天ポイントカード提示で貯まる加盟店一覧。
      加盟店数が膨大 (個店 + 全国チェーン) なので chains-only。
      pointCardId は rakuten-pointcard を対象。
      還元率は店舗によって違うので Gemini に正確な数値抽出を求める。

  - id: d-point-partners
    label: dポイントカード 加盟店 (公式)
    url: https://dpoint.docomo.ne.jp/content/feature/point_realstore.html
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      dポイントカード提示で貯まる加盟店一覧。
      加盟店数が膨大なので chains-only。
      pointCardId は d-pointcard を対象。

  - id: v-point-partners
    label: Vポイント (旧Tポイント) 加盟店 (公式)
    url: https://t-point.tsite.jp/store/list/
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      Vポイントカード (旧Tカード) 提示で貯まる加盟店一覧。
      2024 年に Tポイント が Vポイント に統合。tsite.jp は旧サイトだが現在も提携店リストとして機能している模様。
      pointCardId は vpoint-card を対象。

  - id: ponta-partners
    label: Pontaポイント 提携店・サービス (公式)
    url: https://point.recruit.co.jp/point/?tab=pointUseService
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      Pontaカード提示で貯まる加盟店リスト。
      pointCardId は ponta-card を対象。
      ※ 昨夜 (2026-05-11 夜) は Gemini が混雑 + 思考散文応答で取得失敗、リトライ予定。

  - id: smbc-v-gold-7percent
    label: 三井住友カード ゴールド(NL) 対象店舗 (公式)
    url: https://www.smbc-card.com/mem/cardinfo/cardinfo9001629.jsp
    extractor: card
    produces:
      - storeRules
      - categoryRules
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-12 成功: 対象店舗一覧ページ (cardinfo9001629.jsp) で URL Context Tool 取得成功。
      Gemini が 22 storeRules を抽出 (旧 proper_p5.jsp の散文ループ問題を回避)。
      ただし cardId: "smbc-v-gold" (架空) や storeId 命名差 (seven-eleven vs conv-7eleven 等)
      があり、propose pipeline が全件 needsReview に振り分け。
      実反映は extracted JSON を参照しながら seed-data-stores.ts に手動キュレートで実施。
      ---
      三井住友カード ゴールド(NL) の対象コンビニ・飲食店リスト。
      cardId は smbc-v を対象。
      タッチ決済 (Visa/Mastercard) 利用時の条件付き還元なので、
      storeRules の paymentAppId は pa-visa-touch / pa-quickpay 系を期待。

  - id: mufg-card-global-point
    label: 三菱UFJカード グローバルポイント (公式)
    url: https://www.cr.mufg.jp/mufgcard/point/global/index.html
    extractor: card
    produces:
      - cards
      - categoryRules
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-16 追加 (V4 #A / post-cron 追加カードの sync カバレッジ)。
      v4.0.0 で seed に追加した mufg-card / mufg-pt が cron で
      refresh されるよう、グローバルポイント公式ページを登録。
      cardId は mufg-card を対象 (defaultRate / defaultCurrencyId=mufg-pt の確認)。
      2026-05-16 初回 fetch: Gemini は cardId に sourceId をそのまま返したため
      aliases.json に mufg-card-global-point → mufg-card を追加済。
      defaultCurrencyId=mufg-pt は正しく抽出された (動的注入が機能)。
      defaultRate は seed 0.001 に対し 0.005 (1000円1pt=5円相当) を抽出 →
      ratio 5.0 で rateRatioOutOfRange → needsReview 行き (安全側、要人手判断)。
      カテゴリ別ポイント優遇が明示されていれば categoryRules も拾う。

  - id: orico-card-member-point
    label: オリコカード 会員向けポイント (公式)
    url: https://www.orico.co.jp/creditcard/for/member/orico/
    extractor: card
    produces:
      - cards
      - categoryRules
    extractionScope: chains-only
    enabled: false
    notes: |
      ★ 2026-05-16 一旦無効化 (enabled:false)。
      初回 fetch で本汎用会員ページは「全体付与率 0.5% (200円1pt)」を返すが、
      seed の orico-card は「オリコカード THE POINT」固有の 1% を意図した値。
      別概念のレートのため、このソースを有効にすると alias 適用後
      THE POINT を 1%→0.5% に誤 auto-downgrade する (confidence 0.9025,
      ratio 0.5 で auto 閾値内)。THE POINT 専用の公式スペックページ URL が
      入手でき次第 url 差し替え + enabled:true に戻すこと。
      cardId 揺れ (sourceId をそのまま返す) は aliases.json で正規化済
      (orico-card-member-point → orico-card)。
      ---
      ★ 2026-05-16 追加 (V4 #A / post-cron 追加カードの sync カバレッジ)。
      v4.0.0 で seed に追加した orico-card / orico-pt が cron で
      refresh されるよう、会員向けポイント公式ページを登録。
      cardId は orico-card を対象 (defaultRate / defaultCurrencyId=orico-pt の確認)。
