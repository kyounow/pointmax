# PointMax master sync: source registry
# 各クレカ・ポイントカード・決済アプリの「マスタとなる公式ページ」を列挙する。
# 週次 GitHub Actions cron がこのファイルを読み、各 enabled: true なソースを Gemini CLI に渡す。
#
# 編集ルール:
#  - 新規追加時は id をユニーク (slug, kebab-case) に
#  - 一時的に止めたい場合は enabled: false で残す (履歴のため削除しない)
#  - notes に「なぜこのソースを選んだか」を残すと将来の自分が助かる
#
# extractor の選択肢: card | jal-tokuyaku | point-partner | payment-app
# produces の選択肢:  cards / storeRules / categoryRules / stores / loyaltyRules / paymentApps
# extractionScope:    comprehensive | chains-only | existing-only

version: 1

sources:
  - id: jal-card-tokuyaku-list
    label: JALカード特約店キャンペーン (公式)
    url: https://partner.jal.co.jp/site/tokuyakuten/campaign/
    extractor: jal-tokuyaku
    produces:
      - stores
      - storeRules
      - categoryRules
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-12 復活: 旧 URL (jalcard/use/jaltokuyaku/list/) はサイトリニューアルで 404 だった。
      新 URL は partner.jal.co.jp/site/tokuyakuten/campaign/ (JAL特約店キャンペーン一覧)。
      curl 直接でも 200 OK / 38KB / サーバーレンダ済 HTML を確認。
      他の候補:
        - https://www.jal.co.jp/jp/ja/jalcard/milenet/group/index.html (グループ・チェーン店一覧)
          → curl でタイムアウト、bot 検知の可能性あり。Gemini URL Context なら読めるかは未確認
        - https://jalcard.jal.co.jp/milenet/jalcardlife/newpartner/ (新規特約店)
          → 本文が JS 後読み、curl では filter UI だけで空。SPA 構造
      上記 URL が機能しなくなった場合は、上記候補に切り替えるか pre-fetch retry に任せる。
      ---
      JALカード共通の特約店一覧。マイル積算率 200% (= 2%) の店舗を網羅。
      個別店舗 (地元飲食店等) まで全部含めると膨大なので chains-only に限定。
      全国チェーンだけ新規取り込み、既存登録の特約店についてはキャンペーン/還元率変動を検知。
      cardId は jal-suica を主に対象、他の JALカード保有時は別ソース追加で対応。

  - id: rakuten-point-partners
    label: 楽天ポイントカード 加盟店 (公式)
    url: https://pointcard.rakuten.co.jp/partner/
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      楽天ポイントカード提示で貯まる加盟店一覧。
      加盟店数が膨大 (個店 + 全国チェーン) なので chains-only。
      pointCardId は rakuten-pointcard を対象。
      還元率は店舗によって違うので Gemini に正確な数値抽出を求める。

  - id: d-point-partners
    label: dポイントカード 加盟店 (公式)
    url: https://dpoint.docomo.ne.jp/content/feature/point_realstore.html
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      dポイントカード提示で貯まる加盟店一覧。
      加盟店数が膨大なので chains-only。
      pointCardId は d-pointcard を対象。

  - id: v-point-partners
    label: Vポイント (旧Tポイント) 加盟店 (公式)
    url: https://t-point.tsite.jp/store/list/
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      Vポイントカード (旧Tカード) 提示で貯まる加盟店一覧。
      2024 年に Tポイント が Vポイント に統合。tsite.jp は旧サイトだが現在も提携店リストとして機能している模様。
      pointCardId は vpoint-card を対象。

  - id: ponta-partners
    label: Pontaポイント 提携店・サービス (公式)
    url: https://point.recruit.co.jp/point/?tab=pointUseService
    extractor: point-partner
    produces:
      - stores
      - loyaltyRules
    extractionScope: chains-only
    enabled: true
    notes: |
      Pontaカード提示で貯まる加盟店リスト。
      pointCardId は ponta-card を対象。
      ※ 昨夜 (2026-05-11 夜) は Gemini が混雑 + 思考散文応答で取得失敗、リトライ予定。

  - id: smbc-v-gold-7percent
    label: 三井住友カード ゴールド(NL) 対象店舗 (公式)
    url: https://www.smbc-card.com/mem/cardinfo/cardinfo9001629.jsp
    extractor: card
    produces:
      - storeRules
      - categoryRules
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-12 成功: 対象店舗一覧ページ (cardinfo9001629.jsp) で URL Context Tool 取得成功。
      Gemini が 22 storeRules を抽出 (旧 proper_p5.jsp の散文ループ問題を回避)。
      ただし cardId: "smbc-v-gold" (架空) や storeId 命名差 (seven-eleven vs conv-7eleven 等)
      があり、propose pipeline が全件 needsReview に振り分け。
      実反映は extracted JSON を参照しながら seed-data-stores.ts に手動キュレートで実施。
      ---
      三井住友カード ゴールド(NL) の対象コンビニ・飲食店リスト。
      cardId は smbc-v を対象。
      タッチ決済 (Visa/Mastercard) 利用時の条件付き還元なので、
      storeRules の paymentAppId は pa-visa-touch / pa-quickpay 系を期待。
