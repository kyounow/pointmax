      有賀園ゴルフ 10% 等を期間付き paymentAppId program +
      membership + 新規 store として正しく抽出 (全 needsReview、迷子0)。
      週次 cron は 3-attempt retry で吸収。信頼性重視なら campaign 系を
      GEMINI_MODEL=gemini-2.5-pro 等にする選択肢あり。
      注: Gemini が稀に pointCardId/paymentAppId 双方未設定の program を
      出すが (prompt XOR は schema 強制でない)、idCollision→needsReview
      で人手 catch されるため auto-merge 安全網は機能。

