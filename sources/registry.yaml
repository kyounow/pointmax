# PointMax master sync: source registry
# 各クレカ・ポイントカード・決済アプリの「マスタとなる公式ページ」を列挙する。
# 週次 GitHub Actions cron がこのファイルを読み、各 enabled: true なソースを Gemini CLI に渡す。
#
# 編集ルール:
#  - 新規追加時は id をユニーク (slug, kebab-case) に
#  - 一時的に止めたい場合は enabled: false で残す (履歴のため削除しない)
#  - notes に「なぜこのソースを選んだか」を残すと将来の自分が助かる
#
# extractor の選択肢: card | jal-tokuyaku | point-partner | payment-app
# produces の選択肢:  cards / storeRules / categoryRules / stores / loyaltyRules / paymentApps
# extractionScope:    comprehensive | chains-only | existing-only

version: 1

# extractor prompt の現行 version を集約 (各 *.prompt.md の JSON 例 promptVersion と同期)。
# 新規 extractor 追加 / version bump 時はここを更新。sync:report が SYNC_HISTORY に
# version matrix を記録するために参照 (省略しても動作影響なし)。
extractorVersions:
  campaign: v3.3  # 2026-06-25: confidence 校正 (逐語根拠=explicitness 1.0) + auto 閾値 0.95→0.90
  campaign-index: v1.0  # crawl: index の 1 段目 (子 URL 列挙専用、ExtractedSource は出力しない)
  card: v1.1
  epos-tamaru: v1.0  # 2026-07-15 新設
  jal-tokuyaku: v1.0
  jcb-jpoint: v1.1  # 2026-07-04: #103 対応、店舗特定不能項目の「一般店舗」受け皿禁止を明記
  ongoing-program: v1.1  # 2026-06-10 修正: prompt 本文は PR #37 以降 v1.1 (旧記載 v1.0 は不整合)
  payment-app: v1.1
  point-partner: v1.2

sources:
  - id: jal-card-tokuyaku-list
    label: JALカード特約店 検索結果 (公式)
    url: https://partner.jal.co.jp/search_result/?ptn=1&ct=2&scat=1201
    extractor: jal-tokuyaku
    produces:
      - stores
      - storeRules
      - categoryRules
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-12 (3 度目): milenet/group/index.html も Gemini が "navigation hub,
      not the partner list itself" と判定。実際の店舗データを持つ URL に再々切替。
      partner.jal.co.jp/search_result/ は条件指定型の検索結果ページで、
      ptn=1 (マイルのため方=JALカード決済), ct=2, scat=1201 のパラメタで
      特定カテゴリの特約店リストが取得可能。curl で 104KB のサーバーレンダ済 HTML 確認済。
      他の代替候補 (失敗時の選択肢):
        - https://partner.jal.co.jp/mapsearch/ (地図検索、JS-heavy)
        - https://www.jal.co.jp/jp/ja/jalcard/milenet/group/index.html (navigation hub 判定)
        - https://partner.jal.co.jp/site/tokuyakuten/campaign/ (キャンペーン一覧、店舗 list 無し)
        - https://jalcard.jal.co.jp/milenet/jalcardlife/newpartner/ (新規特約店、月次差分)
      これでも失敗するなら scat パラメタを複数列挙して URL を複数 source に分割する案検討。
      ---
      JALカード共通の特約店一覧。マイル積算率 200% (= 2%) の店舗を網羅。
      個別店舗 (地元飲食店等) まで全部含めると膨大なので chains-only に限定。
      全国チェーンだけ新規取り込み、既存登録の特約店についてはキャンペーン/還元率変動を検知。
      cardId は jal-suica を主に対象、他の JALカード保有時は別ソース追加で対応。

  - id: jal-shop-campaigns
    label: JALカード ショッピングキャンペーン一覧 (公式)
    url: https://partner.jal.co.jp/campaign/?ctn=1&cid=jal_shop_campaign
    extractor: campaign
    produces:
      - stores
      - programs
      - memberships
    extractionScope: chains-only
    enabled: false
    crawl:
      mode: index
      maxChildren: 5
    notes: |
      ★ 2026-06-10 (A-1 索引ハブ対策): crawl: index を設定。enabled:true 化した際は
      1 段目 (campaign-index) で個別キャンペーン詳細 URL を列挙 → 2 段目で各詳細
      ページを campaign extractor で抽出する 2 段階クロールになる。
      ---
      ★ 2026-05-28 追加 (#C-2 キャンペーン獲得拡充、ユーザー提供 URL、初期 enabled:false)。
      JAL カードの店舗別マイル上振れキャンペーン一覧。
      cardIds 候補: ["jal-suica"] (将来 jal-card 一般 / jal-ana 系も対応)。
      還元通貨: jal-mile。期間限定 + 店舗特定の上振れマイル付与施策を campaign-v3.0
      extractor で 1 キャンペーン=1 program (validFrom/validTo + cardIds) + 対象
      店舗 membership として抽出。
      ★ 事前 WebFetch (2026-05-28): 索引ハブだがページ自体に店舗名 (アクアクララ /
      ウエルシアグループ / マツキヨココカラ 等) が見えており、Gemini で抽出可能性あり。
      ただし倍率/期間が「子ページ参照」となっていて 0 件の可能性も高い。実 cron で
      確認後 enabled:true 化。失敗時は別 URL 候補:
        - https://partner.jal.co.jp/campaign/list (一覧サブパス)
        - 個別キャンペーン詳細 URL (子ページ、ユーザー提供待ち)

  - id: jal-card-information
    label: JALカード インフォメーション (公式)
    url: https://www.jal.co.jp/jp/ja/jalcard/information/
    extractor: campaign
    produces:
      - stores
      - programs
      - memberships
    extractionScope: chains-only
    enabled: false
    notes: |
      ★ 2026-05-28 追加 (#C-2 キャンペーン獲得拡充、ユーザー提供 URL、初期 enabled:false)。
      JAL カードのお知らせ/キャンペーン情報集約ページ。
      cardIds 候補: ["jal-suica"]、還元通貨: jal-mile。
      ★ 事前検証 (2026-05-28): curl/WebFetch 両方で接続失敗 (HTTP 000、Anthropic 側
      IP block の可能性)。ただし GitHub Actions の Gemini cron は別 IP から動くため、
      実 cron では取得できる可能性あり。次回 manual workflow_dispatch で動作確認 →
      enabled:true 化 or URL 差し替え判断。
      取得成功時に期待する形: 入会キャンペーン (新規発行 + N マイル) は新規 program、
      店舗別マイル上振れ施策は program+membership として抽出。日付明記が無いものは
      campaign extractor が 0 件で返す保守動作 (既存 jre-point-campaigns 等と同じ)。

