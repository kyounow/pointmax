      で当一覧ページから個別キャンペーン詳細 URL を列挙 → 2 段目で各詳細ページを
      campaign extractor で抽出 → 1 つの extracted JSON に統合。一覧自体は抽選・
      全体施策中心だが、個別詳細ページに「店舗×率×期間」があるケースを拾えるように
      なる。次回 cron で子ページからの抽出件数を確認。
      ---
      ★ 2026-05-17 追加 (#B 決済系キャンペーン、PR-D1 で proposePrograms
      が通ったので解禁)。paymentAppId=pa-rakuten-pay、還元通貨 rakuten-pt。
      campaign-v3.0 extractor が「対象店舗 × 楽天Pay 期間限定上振れ」を
      1 キャンペーン=1 program (paymentAppId+validFrom/validTo) + 対象
      店舗 membership として抽出。店舗非依存の全体施策・日付なしは出力
      しない方針。新規 program は base "idCollision" で必ず needsReview
      (ライブ還元計算に効くため無確認 auto-merge されない)。
      ★ 実 fetch 検証 (2026-05-17、独立 2 回とも clean success):
      抽出 0 件。当一覧 URL は抽選・「最大」・店舗指定なしの全体施策
      中心で「固定還元率+対象店舗+期間」が揃うキャンペーンを含まない
      (d払いと違い構造的に抽出対象なし)。thinking-leak ではなく Gemini
      が 2 回とも正しく「対象外」判定=extractor の保守動作が正常。
      実データには別 URL (個別詳細 or 店舗特定の一覧) が必要
      → 2026-06-10 の crawl: index 化で解消。

  - id: jcb-jpoint-partners
    label: JCB J-POINT パートナー (旧 Oki Doki ランド、公式)
    url: https://j-pointpartner.jcb.co.jp/search
    extractor: jcb-jpoint
    produces:
      - stores
      - programs
      - memberships
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-20 V5 Phase 3 で追加、V5-1 (同日) で enabled: true 化。
      V5-2 でカードグレード別に 2 系列分離: W (cardIds=["jcb-w"]、基本 1%) と
      Gold (cardIds=["jcb-gold"]、基本 0.5%)。倍率階層別 (2倍/3倍/4倍/20倍 等)
      で W 系列 / Gold 系列の program を出力。currencyId="j-point"、
      bonusType="primary"。全 program に entryUrl:
      https://j-pointpartner.jcb.co.jp/search を付与 (店ごとのポイントアップ登録
      が必要、無料、期限なし)。
      手動 seed 投入済 (V5-2 時点): W 系列 9 + Gold 系列 9 = 18 memberships。
      cron は未網羅の提携店を追加する位置付け、auto-merge は全件 needsReview
      なので安全網あり。
      ★ enabled: true 化判断 (V5-1, 2026-05-20):
        手動 fetch 試行は Flash 503 (Google 側混雑) / Pro 429 (free tier クォータ 0)
        で全 3 attempt 失敗。実証検証できなかったが、現行 cron の他 source
        (rakuten/d/v-point-partners 等) と同じ 3-attempt retry + needsReview
        ロジックで吸収する設計なので有効化リスクは低いと判断。次回週次 cron で
        Flash の混雑解消時に実証検証される想定。
      代替候補 URL (検索が JS で動的描画される場合):
        - https://j-pointpartner.jcb.co.jp/partner/list?genre=01 (ジャンル別)
        - https://j-pointpartner.jcb.co.jp/genre/ (ジャンル目次)

  - id: d-pay-campaigns
    label: d払い キャンペーン一覧 (公式)
    url: https://service.smt.docomo.ne.jp/keitai_payment/campaign/
    extractor: campaign
    produces:
      - stores
      - programs
      - memberships
    extractionScope: chains-only
    enabled: true
    notes: |
      ★ 2026-05-17 追加 (#B 決済系キャンペーン)。paymentAppId=pa-d-pay、
      還元通貨 d-pt。扱いは rakuten-pay-campaigns と同じ (campaign-v3.0、
      店舗特定+期間明記のみ、新規 program は needsReview)。
      ★ 実 fetch 検証: 当ページは抽出可能な実データ豊富 (索引ハブでない)。
      gemini-2.5-flash が時折 thinking-leak で nonJson を返す非決定的
